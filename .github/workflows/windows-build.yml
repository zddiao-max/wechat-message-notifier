# Initial CI workflow generated by OpenAI Codex on 2026-06-29.

name: Windows build and test

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build notifier
        shell: powershell
        run: powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\build.ps1

      - name: Run self-tests
        shell: powershell
        run: powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\test.ps1

      - name: Upload Windows executable
        uses: actions/upload-artifact@v4
        with:
          name: WeChatMessageNotifier-Windows
          path: outputs/WeChatMessageNotifier/
